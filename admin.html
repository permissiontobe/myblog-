<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Desk – Permission to Be</title>
<style>
body { margin:0; padding:0; font-family:'Georgia', serif; background: radial-gradient(circle at top, #1b1b2f, #0b0b14); color:#f5f3ef; }
.container { max-width:900px; margin:60px auto; background:rgba(30,40,80,0.45); padding:40px; border-radius:20px; backdrop-filter:blur(10px); box-shadow:0 0 40px rgba(255,220,180,0.08);}
h1 { text-align:center; margin-bottom:30px; letter-spacing:1px; }
input, textarea { width:100%; padding:14px 16px; margin-bottom:20px; border-radius:12px; border:none; outline:none; font-size:1rem; font-family:'Georgia', serif; }
textarea { height:240px; resize:vertical; }
button { padding:14px 26px; border-radius:12px; border:none; background:#ffcaa6; color:#1b1b2f; font-weight:bold; font-size:1rem; cursor:pointer; transition: transform 0.2s; }
button:hover { transform: scale(1.03); }
.posts { margin-top:50px; }
.post-card { background: rgba(255,255,255,0.06); padding:20px; border-radius:14px; margin-bottom:20px; }
.post-card h3 { margin:0 0 10px 0; }
.post-card p { opacity:0.85; line-height:1.6; }
.delete-btn { background:transparent; color:#ffcaa6; border:none; cursor:pointer; font-size:0.9rem; }
</style>
</head>
<body>

<div class="container">
  <span id="closeDesk" style="position:absolute; top:20px; right:20px; font-size:1.5rem; cursor:pointer;">×</span>
  <h1>🕯 Permission to Be — Writing Desk</h1>
  <input type="text" id="title" placeholder="Post title…">
  <textarea id="content" placeholder="Write from the heart…"></textarea>
  <button onclick="publishPost()">Publish</button>
  <div class="posts" id="posts"></div>
</div>

<script>
const postsContainer = document.getElementById("posts");
let posts = JSON.parse(localStorage.getItem("blogPosts")) || [];
renderPosts();

function publishPost() {
  const title = document.getElementById("title").value.trim();
  const content = document.getElementById("content").value.trim();
  if (!title || !content) { alert("Please write both a title and content 🌿"); return; }

  const post = { id: Date.now(), title, content };
  posts.unshift(post);
  localStorage.setItem("blogPosts", JSON.stringify(posts));

  document.getElementById("title").value = "";
  document.getElementById("content").value = "";

  renderPosts();

  // Notify homepage to update cards instantly
  window.dispatchEvent(new Event("postsUpdated"));
}

function renderPosts() {
  postsContainer.innerHTML = "<h2>Your posts</h2>";
  posts.forEach(post => {
    const div = document.createElement("div");
    div.className = "post-card";
    div.innerHTML = `
      <h3>${post.title}</h3>
      <p>${post.content}</p>
      <button class="delete-btn" onclick="deletePost(${post.id})">Delete</button>
    `;
    postsContainer.appendChild(div);
  });
}

function deletePost(id) {
  posts = posts.filter(p => p.id !== id);
  localStorage.setItem("blogPosts", JSON.stringify(posts));
  renderPosts();
  window.dispatchEvent(new Event("postsUpdated")); // update homepage
}
const closeDeskBtn = document.getElementById("closeDesk");
const container = document.querySelector(".container");

closeDeskBtn.addEventListener("click", () => {
  container.style.display = "none"; // hides the whole admin desk
});
</script>

</body>
</html>
